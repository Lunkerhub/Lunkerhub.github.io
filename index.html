<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поэтика Есенина: 8 особенностей</title>
    <style>
        :root {
            --blue-glow: #0077ff;
            --accent: #00f2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            /* Градиент черно-синий */
            background: radial-gradient(circle at center, #001529 0%, #000000 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            z-index: 2;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            min-height: 450px;
            transition: all 0.5s ease;
        }

        h1 { color: var(--accent); font-size: 2.2em; text-align: center; margin-top: 0; }
        h2 { color: #ffd700; font-size: 1.5em; border-bottom: 1px solid #333; padding-bottom: 10px; }
        p { line-height: 1.8; font-size: 1.2em; }
        
        .feature-tag {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px 0 60px;
            z-index: 2;
        }

        .btn {
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .page-num { font-family: monospace; font-size: 1.2em; color: #fff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container" id="app">
    <!-- Контент будет здесь -->
</div>

<div class="navigation">
    <button class="btn" id="prev" onclick="changePage(-1)">Назад</button>
    <span class="page-num" id="current-num">1 / 8</span>
    <button class="btn" id="next" onclick="changePage(1)">Вперед</button>
</div>

<script>
    const pages = [
        {
            title: "1. Всеобщее одушевление",
            tag: "Антропоморфизм",
            text: "Центральная особенность — природа у Есенина не описывается, а живет как человек. Она наделена речью, чувствами и физиологией. Березы имеют «кожицу», роща «отговорила», а закат «пылает как пожар»."
        },
        {
            title: "2. Цветопись (Колористика)",
            tag: "Символика цвета",
            text: "Есенин — мастер визуальных образов. Главный цвет — синий (символ Руси, чистоты, неба). Золотой символизирует увядание и святость. Розовый — юность и несбыточность мечты."
        },
        {
            title: "3. Слияние земного и небесного",
            tag: "Космизм",
            text: "В лирике Есенина бытовые детали крестьянской жизни (солома, хомут, деготь) соседствуют с космическими образами. Небо для него — это пашня, а месяц — ягненок."
        },
        {
            title: "4. Животный мир как зеркало",
            tag: "Гуманизм",
            text: "Особая черта — отношение к животным как к «братьям нашим меньшим». Через страдания зверей («Песнь о собаке», «Корова») поэт передает трагизм человеческого бытия."
        },
        {
            title: "5. Религиозные мотивы",
            tag: "Христианская эстетика",
            text: "Ранняя лирика пропитана образами рая, святых и церквей. Но это не строгое православие, а народное, языческое восприятие веры, где природа сама является храмом."
        },
        {
            title: "6. Имажинизм и метафоричность",
            tag: "Сложный образ",
            text: "В 20-е годы Есенин уходит в поиск «сложного образа». Его метафоры становятся резкими, порой грубыми. Он создает «Исповедь хулигана», где лирический герой бунтует против формы."
        },
        {
            title: "7. Мотив увядания и смерти",
            tag: "Философская лирика",
            text: "В позднем творчестве преобладает тема «прощания». Он пишет о себе как об уходящем герое («Я последний поэт деревни»). Лирика становится трагичной, исповедальной и пронзительной."
        },
        {
            title: "8. Синтез фольклора и классики",
            tag: "Мелодика",
            text: "Особенность ритма Есенина — его близость к народной песне и частушке. Именно поэтому сотни его стихотворений стали популярными романсами."
        }
    ];

    let current = 0;

    function render() {
        const page = pages[current];
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="feature-tag">${page.tag}</div>
            <h1>${page.title}</h1>
            <p>${page.text}</p>
        `;
        document.getElementById('current-num').innerText = `${current + 1} / 8`;
        document.getElementById('prev').disabled = current === 0;
        document.getElementById('next').disabled = current === pages.length - 1;
    }

    function changePage(dir) {
        current += dir;
        render();
    }

    render();

    /* --- РАДУЖНАЯ ЛИНИЯ ЗА КУРСОРOM --- */
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
        points.push({ x: e.clientX, y: e.clientY, hue: (Date.now() / 10) % 360, age: 0 });
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 1; i < points.length; i++) {
            const p = points[i];
            const prev = points[i-1];
            p.age++;
            if (p.age > 30) { points.splice(i, 1); continue; }

            ctx.beginPath();
            ctx.lineWidth = 8 * (1 - p.age/30);
            ctx.strokeStyle = `hsla(${p.hue}, 100%, 50%, ${1 - p.age/30})`;
            ctx.lineCap = 'round';
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
